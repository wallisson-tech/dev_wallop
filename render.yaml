databases:
  - name: portfolio-db
    databaseName: portfolio_db
    user: portfolio

services:
  - type: web
    name: portfolio
    env: ruby
    buildCommand: ./bin/render-build.sh
    startCommand: ./bin/rails server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false